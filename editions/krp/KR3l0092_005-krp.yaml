body:
  text: 穆天子傳卷五晉郭璞註古文寶處曰天子四日休于濩澤今平陽濩澤縣是也音濩特於是射鳥獵獸丁丑天子闕雨乃至祭父自圃鄭來謁鄭有圃田因云圃鄭謁告也留昆歸玉百枝留昆國見紀年陖翟致賂陖翟隗姓國也音峻良馬百駟傳曰文馬百駟歸畢之寶畢國名言翟前取此寶也以詰其成成謂平也詰猶責也陖子胡闕東牡夷狄有德者稱子疇胡名見許男于洧上男爵也許國今許昌縣洧水之所在音羽軌反祭父以天子命辭曰去茲羔用玉帛見禮男執蒲璧許男欲崇謙故執羔也許男不敢辭奉王命還取束帛加璧闕毛公舉幣玉毛公即毛班也是日也天子飲許男于洧上天子曰朕非許邦而恤百姓闕也咎氏宴飲毋有禮禮天子稱異姓諸侯為伯舅燕者私㑹不欲崇禮敬也管子曰伯舅無下拜字亦作舅咎猶舅也許男不敢辭升坐于出尊禮記曰反玷出尊唯兩君為好既獻反爵玷上出尊葢此之𩔖也坐之於尊邊使為酒魁欲以盡歡酣也乃用宴樂言曲宴也天子賜許男駿馬十六稱駿者名馬也許男降再拜空首空首頭至于地周禮三日空拜乃升平坐及暮天子遣許男歸癸亥天子乘鳥舟龍卒浮于大沼沼池龍下有舟字舟皆以龍鳥為形制今吳之青雀舫此其遗制者夏庚午天子飲于洧上乃遣祭父如圃鄭用闕諸侯辛未天子北還釣于漸澤食魚于桑野丁丑天子里圃田之路盡規度以為苑圃地而虞守之也東至于房房房子屬趙國地有巑山西至于闕丘南至于桑野北盡經林煮闕之藪南北五十闕十虞東虞曰兔臺西虞曰櫟丘櫟今河南陽翟縣音櫟南虞曰闕富丘北虞曰相其御虞曰闕來十虞所闕辰天子次于軍丘以畋于藪闕甲寅天子作居范宫范離宫之名也以觀桑者桑採桑也詩云桑者閒閒兮乃飲于桑中桑林之中天子命桑虞主桑者也出闕桑者用禁暴人不得令妄􅀈犯桑木仲夏甲申天子闕所庚寅天子西遊乃宿于祭祭祭公邑壬辰祭公飲天子酒乃歌􅂒天之詩詩頌有昊天有成命二后受之成王不敢康疑祭公以此規諌也天子命歌南山有詩小雅有南山有臺樂只君子邦家之基以荅祭公之言然皆古字難曉所以未詳乃紹宴樂紹繼也丁酉天子作臺以為西居壬寅天子東至于雀梁甲辰浮于滎水今滎陽滎澤是乃奏廣樂季夏庚闕休于范宫仲秋丁巳天子射鹿于林中乃飲于孟氏爰舞白鶴二八今之畜鶴孔雀馴者亦能應節鼔舞還宿于雀梁季秋辛巳天子司戎于闕來虞人次御以次侍御備有所問孟冬鳥至鴈來翔也王臣闕弋下云王臣諸侯姬姓姓女疑是婦官也仲冬丁酉天子射獸休于深雚雚葦之藂得麋麕豕鹿四百有二十得二虎九狼乃祭于先王命庖人熟之庖人主飲食者戊戍天子西逰射于中闕方落草木鮮命虞人掠林除藪以為百姓材以供人之材用掠謂􅀈伐之是日也天子北入于邴邴鄭邑也音丙與井公博三日而決疑井公賢人而𨼆枋故穆王就之逰戲也辛丑塞戒不如故進為塞也至于臺乃大暑除天子居于臺以聽天下之因以避暑逺方闕之數而衆從之是以選扐音勒乃載之神人闕之能數也有道數也乃左右望之占候也天子樂之愛其術也命為闕而時闕焉闕其名曰闕公去乗人闕猶闕有虎在乎葭中葭屮天子將至七萃之士高奔戎請生捕虎必全之乃生捕虎而獻之詩所謂袒裼暴虎獻于公所此之謂也天子命之為柙柙檻也論語曰虎兕出於柙而畜之東虞是為虎牢因以名其地也今滎陽成臯縣是天子賜奔戎畋馬十駟爾雅曰畋獵齊足尚疾也歸之太牢牛羊豕為太牢奔戎再拜䭫首丙辰天子北逰于林中乃大受命而歸仲秋甲戍天子東逰次于雀梁一宿為舍再宿為信過信為次闕蠧書于羽林謂暴書中蠧蟲因云蠧書也季秋闕乃宿于􅀈畢人告戎告戎難也曰陖翟來侵天子使孟悆如畢討戎悆音豫霍侯舊告薨霍國今在平陽永安縣西南有城天子臨于軍丘狩于藪季冬甲戍天子東遊飲于留祈射于麗虎讀書于菞丘君舉必書菞闕音犂獻酒于天子乃奏廣樂天子遺其靈鼓乃化為黄蛇周禮曰靈鼓四面洪範所謂鼔妖也是日天子鼓道其下而鳴從失鼓而擊鼔也鼓在地下鳴道從也韓非曰道南方來也乃樹之桐因以樹梧桐桐亦響木也以為鼓則神且鳴則利於戎宜以攻戎以為琴則利闕于黄澤東遊於黄澤宿于曲洛洛水之回曲地名也廢闕使宫樂謡官樂典樂者曰黄之池其馬歕沙歕䮧也善問切皇人威儀威畏也黄之澤其馬歕玉皆諸侯辭皇人受榖榖生也丙辰天子南遊于黄闕室之丘以觀夏后啟之所居疑此言太室之丘嵩高山啟母在此山化為石而子啟亦登仙故其上有啓石也皆見歸藏及淮南子乃闕于啓室似謂入啓室中天子筮獵苹澤音缾其卦遇訟坎下乾上逢公占之曰訟之繇繇爻辭音由藪澤蒼蒼其中闕宜其正公戎事則從水性平而天無私兵不曲撓而戎事集也祭祀則憙畋獵則獲闕飲逢公酒賜之駿馬十六絺紵三十篋絺葛精者逢公再拜稽首賜筮史狐闕有陰雨夢神有事有事祭也是謂重陰因以紀也天子乃休日中大寒北風雨雪有凍人天子作詩三章以哀民哀猶愍也曰我徂黄竹闕員閟寒帝收九行行道也言收羅九域之道里也左傳曰經啟九道嗟我公侯百辟冢卿辟君冢卿冢宰皇我萬民皇正也旦夕弗忘恒念之也我徂黄竹闕員閟寒帝收九行嗟我公侯百辟冢卿皇我萬民旦夕勿窮令無困也有皎者鴼鴼鳥名皎白貌音路翩翩其飛言得意也嗟我公侯闕勿則自侯以下似當云百辟冢卿皇我萬民闕勿則居樂甚寡言守一居少樂不如土居無求安禮樂其民言當以禮樂化其人也天子曰余一人則淫淫于遊樂不皇萬民闕登乃宿于黄竹天子夢羿射于塗山羿有窮氏帝善射者祭公占之疏闕之闕乃宿于曲山壬申天子西升于曲山闕天子西征升九阿疑今西安縣十里九坂也南宿于丹黄戊寅天子西升于陽闕過于靈闕井公博穆王往返輙從井公博逰明其有道德人也乃駕鹿以逰于山上為之石主而闕窴軨即軨坂也今在河東大陽縣傳曰入于窴軨巔零二音乃次于浢水之陽今之浢津也在河東河北縣音項脰之脰吉日丁亥天子入于南鄭穆天子傳卷五
