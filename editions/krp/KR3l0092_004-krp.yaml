body:
  text: 穆天子傳卷四晉郭璞註古文庚辰至于滔水濁繇氏之所食山海經曰有川名曰三淖昆吾之所食亦此𩔖辛巳天子東征癸未至于蘇谷骨飦氏之所衣被言谷中有草木皮可以為衣被乃遂南征東還丙戍至于長湠重􅀈氏之西疆疆界也丁亥天子升于長湠乃遂東征庚寅至于重􅀈氏黑水之阿爰有野麥自然生也爰有荅堇祗謹兩音西膜之所謂木禾木禾粟𩔖也長五㝷大五圍見山海經云重􅀈氏之所食爰有采石之山出文采之石也重􅀈氏之所守曰枝斯璿瑰璿瑰玉名左傳曰贈我以璿瑰旋囘兩音􅀈瑶亦玉名瑶音遥琅玕石似珠也郎干兩音玪先皆玉名字皆無聞玪璅音鈐瑣玗琪玉屬也于其二音尾無聞焉凡好石之器于是出盡出此山孟秋癸巳天子命重􅀈氏共食天子之屬音共言不及六師也五日丁酉天子升于采石之山於是取采石焉天子使重􅀈之民鑄以成器于黑水之上今外國人所鑄作器者亦皆石𩔖也器服物佩好無疆曰天子一月休秋癸亥天子觴重􅀈之人􅀈􅀢乃賜之黄金之罌二九銀烏一隻貝帶五十朱七百裹箭桂薑百崗絲雕官􅀈􅀢乃膜拜而受乙丑天子東征􅀈􅀢送天子至于長沙之山闕隻天子使栢天受之栢天曰重􅀈氏之先三苗氏之闕處以黄木銀采闕乃膜拜而受三苗舜所竄於三危山者丙寅天子東征南還己巳至于文山西膜之所謂闕觴天子于文山西膜之人乃獻食馬三百牛羊二千穄米千車天子使畢矩受之曰闕天子三日遊于文山於是取采石以有采石故號文山壬寅天子飲于文山之下文山之人歸遺歸遺名也乃獻良馬十駟四馬為駟用牛三百守狗九十牥牛二百以行流沙此牛能行流沙中如槖駝天子之豪馬豪牛豪猶髭也山海經云髭馬如馬足四節皆有毛尨狗尨尨茸謂猛狗或曰尨亦狗名豪羊似髦牛以三十祭文山又賜之黄金之罌二九貝帶三十朱三百裹桂薑百崗歸遺乃膜拜而受癸酉天子命駕八駿之乗右服騮疑驊騮字而左綠耳右驂赤蘎古驥字而左白􅀈古義字天子主車造父為御􅀢為右次車之乗次車副車右服渠黄而左踰輪右盜驪而左山子栢天主車叅百為御奔戎為右天子乃遂東南翔行馳驅千里一舉轡千里行如飛翔至于巨蒐之人奴乃獻白鵠之血以飲天子所以飲血益人炁力因具牛羊之湩湩乳也今江南人亦呼乳為湩音寒凍反以洗天子之足令肌膚滑及二乗之人謂主天子車及副車者也甲戍巨蒐之奴觴天子于焚留之山乃獻馬三百牛羊五千秋麥千車秋麥禾也膜稷三十車稷粟也膜未聞天子使栢天受之好獻枝斯之石四十精者為英舅珌佩百隻琅玕四十十篋疑此紵葛之屬天子使造父受之闕乃賜之銀木采黄金之罌二九貝帶四十朱三百裹桂薑百奴乃膜拜而受乙亥天子南征陽紆之東尾尾後山也乃遂絶􅀈之谷已至于河之水北阿爰有溲之闕河伯之孫今西有渠搜國疑渠字事皇天子之山有模堇其葉是食明后模堇木名后君也堇音謹天子嘉之賜以佩玉一隻栢天再拜稽首癸丑天子東征栢天送天子至于䣙人䣙伯絮觴天子于澡澤之上多之汭汭水涯河水之所南還還回也音旋曰天子五日休于澡澤之上以待六師之人戊午天子東征顧命栢天歸于丌邦天子曰河宗正也栢天再拜稽首辭去也天子南旋升于長松之隥坂有長松孟冬壬戍至于雷首雷首山名今在河東蒲坂縣南也犬戎胡觴天子于雷首之阿乃獻食馬四六天子使孔牙受之曰雷水之平寒寡人具犬馬羊牛爰有黑牛白角爰有黑羊白血記異也癸亥天子南征升于髭之隥音訾丙寅天子至于鈃山之隊東升于三道之隥乃宿于二邊命毛班毛班毛伯衛之先也逢固先至于周以待天之命癸酉天子命駕八駿之乗赤驥之駟造父為御闕南征翔行逕絶翟道翟道在隴西謂截隴坂過升于太行南濟于河馳驅千里遂入于宗周官人進白鵠之血以飲天子以洗天子之足亦謂乳也造父乃具羊之血以飲四馬之乗一與王同車御右之屬左傳所謂四乗是也庚辰天子大朝于宗周之廟乃里西土之數里謂計其道里也紀年曰穆王西征還里天下億有九萬里曰自宗周瀍水以西瀍水今在洛西洛即成周也音纒至于河宗之邦陽紆之山三千有四百里自陽紆西至于西夏氏二千又五百里自西夏至于珠余氏及河首千又五百里自河首襄山以西南至于舂山珠澤昆侖之丘七百里自舂山以西至于赤烏氏舂山三百里東北還至于羣玉之山截舂山以北截由沮也自羣玉之山以西至于西王母之邦三千里闕自西王母之邦北至于曠原之野飛鳥之所解其羽所謂解毛之處千有九百里闕宗周至于西北大曠原案山海經云群鳥所集澤有兩處一方百里一方千里即此大曠原也萬四千里乃還東南復至于陽紆七千里還歸于周三千里各行兼數三萬有五千里吉日甲申天子祭于宗周之廟告行反也書大傳曰反必告廟也乙酉天子闕六師之人于洛水之上丁亥天子北濟于河闕􅀈之隊以西北升于盟門九河之隥盟門山今在河北尸子曰河出于盟門之上乃遂西南仲冬壬辰至山之上乃奏廣樂三日而終吉日丁酉天子入于南鄭今京兆鄭縣也紀年穆王元年築祗宫于南鄭傳所謂王是以獲沒于祗宫者穆天子傳卷四
