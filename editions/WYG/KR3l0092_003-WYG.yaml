body:
  text: 穆天子傳卷三晉郭璞註古文吉日甲子天子賔于西王母西王母如人虎齒蓬髮戴勝善嘯紀年穆王十七年西征崑崙丘見西王母其年來見賔于昭宫乃執白圭𤣥璧以見西王母執贄者致敬也好獻錦組百純闕組三百純純疋端名也周禮曰純帛不過五兩組綬屬音祖西王母再拜受之闕乙丑天子觴西王母于瑶池之上西王母為天子謡徒歌曰謡曰白雲在天山䧙陵字自出道里悠逺山川間之間音諌將子無死將請也尚能復來尚庶幾也天子答之曰予歸東土和治諸夏萬民平均吾顧見汝顧還也比及三年將復而野復反此野而見汝也天子遂驅升于弇山弇弇兹山日入所也乃紀丌跡于弇山之石銘題之而樹之槐眉曰西王母之山言是西王母所居也西王母之山還歸丌闕世民作憂以吟曰比徂西土徂往也爰居其野虎豹為群於鵲與處於讀曰烏嘉命不遷言守此一方我惟帝帝天帝也天子大命而不可稱顧世民之恩流涕芔隕吹笙鼓簧簧在笙中中心翔翔憂無薄也世民之子唯天之望所瞻望也丁未天子飲于温山闕考鳥紀年曰穆王見西王母西王母止之曰有鳥􅀈人疑説此烏脫治不可知也己酉天子飲于溽水之上溽音淑乃發憲命憲謂法令詔六師之人闕其羽爰有闕藪水澤爰有陵衍平陸大阜曰陵高平曰陸碩鳥解羽六師之人畢至于曠原言將獵也下云北至曠原之野飛鳥之所解其羽山海經云大澤方千里群鳥之所生及所解紀年曰穆王北征行積羽千里皆謂此野耳曰天子三月舍于曠原闕天子大饗正公諸侯王勒七萃之士勒猶勞也于羽琌之上下有羽陵疑亦同乃奏廣樂闕六師之人翔畋于曠原翔猶遊也得獲無疆無疆無限也鳥獸絕羣言取盡也六師之人大畋九日乃駐于羽之闕收皮效物物謂毛色也詩云九十維物債車受載債猶借也天子於是載羽百緷十羽為箴百羽為縳十縳為緷見周官己亥天子東歸六師闕起庚子至于闕之山而休以待六師之人庚辰天子東征癸未至于戊闕之山智氏之所處闕智闕往天子于戊闕之山勞用白驂二疋驂騑馬也野馬野牛四十守犬七十任守備者乃獻食馬四百牛羊三千曰智氏闕天子北遊于子之澤智氏之夫獻酒百闕于天子天子賜之狗璅采疑玉名黄金之罌二九貝帶四十朱丹三百裹桂薑百闕乃膜拜而受乙酉天子南征東還己丑至于獻水乃遂東征飲而行乃遂東南己亥至于𤓰纑之山三周若城言山周匝三重狀如城壘閼氏胡氏閼音遏之所保天子乃遂東征南絶沙衍沙衍水中有沙者辛丑天子渴于沙衍沙中無水泉求飲未至七萃之士高奔戎刺其左驂之頸取其青血以飲天子今西方羌胡刺馬咽取血飲渴亦愈天子美之乃賜奔戎佩玉一隻奔戎再拜䭫首古稽字天子乃遂南征甲辰至于積山之爰有栢曰余之人命懷命懷人名獻酒于天子天子賜之黄金之罌貝帶朱丹七十裹命懷乃膜拜而受乙巳闕諸飦獻酒于天子諸飦亦人名音犍牛之犍天子賜之黄金之罌貝帶朱丹七十裹諸飦乃膜拜而受之穆天子傳卷三
