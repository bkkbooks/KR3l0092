  text: 欽定四庫全書子部十二
  hash: sha256:b91c7627c34399fce720371900e7def4c0469982b792a8bd4a0a78b88d470d59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0092_WYG_000-1a, image: WYG1042/WYG1042-0245a.png}
body:
  text: 穆天子傳小説家𩔖二異聞之屬提要臣等謹案穆天子傳六卷晉郭璞注前有荀朂序按束晳傳云太康二年汲縣人不凖盜發魏襄王墓得竹書穆天子傳五篇又􅇎書十九篇周食田法周書論楚事周穆王美人盛姬事按今盛姬事載穆天子傳第六卷葢即束晳傳所謂􅇎書之一篇也尋其文法應歸此傳束晳傳别出之非也此書記事有月日而無年又文多斷缺以今本竹書紀年較之紀年載十二年冬王北巡狩遂征犬戎事在傳之第一卷十四年夏王畋於軍邱五月作范宫作虎牢事在傳之第五卷十五年作重壁臺冬王觀於鹽澤事在傳之第六卷十七年王西征崑崙邱見西王母事在傳之第二卷第三卷第四卷兩書同時並出荀朂等互校其文不應牴牾如此葢今本竹書紀年乃明人摭諸書以為之非汲冢之舊本併郭璞注中所引紀年之文尚掇拾未盡况暇考其次第乎是亦今本紀年出於依托之一証或乃謂當移五卷六卷於二卷之前以符竹書之次第則削趾適屨矣書中所紀雖多夸言寡寔然所謂西王母者不過西方一國君所謂縣圃者不過飛鳥百獸之所飲食為大荒之圃澤無所謂神仙怪異之事所謂河宗氏亦僅國名無所謂魚龍變見之説較山海經淮南子猶為近寔郭璞注爾雅西王母句不過云西方昏荒之國於河出崑崙墟句雖引大荒西經而不言其靈異其注此書乃頗引志怪之談葢釋經不敢不謹嚴而箋釋􅇎書則務矜博洽故也列子周穆王篇所載與此傳相出入葢當時流俗有此記如後世小説野乗之𩔖故列禦冦得捃採其文耳世所傳汲冡書師春之𩔖已亡逸周書又屬後人沿誤紀年偽妄顯然其獲存於今者惟此傳矣然文字既古訛脱又甚學者多不究心封膜晝於河水之陽見第二卷膜晝自是人名封者錫以爵邑張彦逺厯代名畫記誤以晝字為畫字遂以封膜為畫家之祖山䧙自出乃西王母謡見第三卷方回瀛奎律髓注陳子昂詩邱陵徒自出句乃云自出二字疑誤第二卷云乃為銘迹於縣圃之上第三卷云乃紀丌跡於弇山之石其文甚明朱珪名蹟録乃謂取穆天子傳為名蹟於弇兹石上全然舛迕其傳也亦在若存若亡之間固考古者所宜寳重矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀穆天子傳序穆天子傳出汲冢晉荀朂校定為六卷有序言其事雖不典其文甚古頗可觀覽予考書序稱穆王饗國百年耄荒太史公記穆王賔西王母事與諸傳説所載多合則此書葢備記一時之詳不可厚誣也春秋之時諸侯各有國史多龎雜之言下逮戰國王迹熄而聖言湮處士横議而異端起人人家自為説求其欲不龎雜其可得乎其書紀王與七萃之士廵行天下然則徒衛簡而徴求寡矣非有如秦漢之千騎萬乘空國而出也王之自數其過及七萃之規未聞以為迕也登羣玉山命邢侯攻玉而不受其牢是先王恤民之法未嘗不行至遇雨雪士皆使休獨王之八駿超騰以先待輙旬日然後復發去是非督令致期也其承成康熈洽之餘百姓晏然雖以徐偃王之力行仁義不足以為倡而揺天下以知非有暴行虐政而君子猶以王為獲沒於祗宫為深幸足以見人心之危之如此也是豈可效哉是豈可效哉存其書者固可以覽其古徴其事者又安可不考其是非與南臺都事海岱劉貞庭幹舊藏是書懼其無傳暇日稍加讎校訛舛命金陵學官重刋與博雅之士共之諗予題其篇端云時至正十年嵗在庚寅春二月二十七日壬子北岳王漸𤣥翰序穆天子傳序序古文穆天子傳者太康二年汲縣民不准盜發古塚所得書也皆竹簡素絲編以臣朂前所考定古尺度其簡長二尺四寸以墨書一簡四十字汲者戰國時魏地也案所得紀年葢魏惠成王子令王之塚也於世本葢襄王也案史記六國年表自令王二十一年至秦始皇三十四年燔書之歳八十六年及至太康二年初得此書凡五百七十九年其書言周穆王逰行之事春秋左氏傳曰穆王欲肆其心周行於天下將皆使有車轍馬迹焉此書所載則其事也王好巡守得盜驪騄耳之乗造父為御以觀四荒北絶流沙西登昆侖見西王母與太史公記同汲郡收書不謹多毁落殘缺雖其言不典皆是古書頗可觀覽謹以二尺黄紙寫上請事平以本簡書及所新寫並付祕書繕寫藏之中經副在三閣謹序
