body:
  text: 穆天子傳巻六晉郭璞註古文之虚皇帝之閭乃闕先王九觀以詔後世此復是登名山有所銘勒封建也殘缺字多不可推考耳己巳天子闕征舍于菹臺辛未紐菹之獸管子曰菹菜之壤今吳人呼田獵茸草地為菹音罝於是白鹿一牾椉逸出走言突圍出牾觸也或曰所駕鹿迕猶驚也天子乗渠黄之乗闕焉自此已上疑説遂得鹿之狀天子丘之丘謂為之名號方言耳是曰五鹿官人之闕是丘闕其皮是曰闕皮闕其脯是曰闕脯天子飲于漯水之上漯水今濟陰漯陰縣音沓官人膳鹿獻之天子天子美之是曰甘自此以上皆因鹿以名所在地用紀之也今元城縣東郭有五鹿墟晉文公所一食於野人處者也癸酉天子南祭白鹿于漯闕乃西飲于草中草野之中大奏廣樂大謂盛作之也是曰樂人亦以紀之甲戍天子西北闕姬姓也盛栢之子也盛國名疑上說姬事公羊傳曰成者何盛也者為諱之盛諱戚同姓者天子賜之上姬之長今盛栢為姬姓之長位位在上也是曰盛門天子乃為之臺為盛姬築臺也是曰重璧之臺言臺狀如壘璧戊寅天子東狃于澤中逢寒疾言盛姬在此遇風寒得疾天子舍于澤中盛姬告病天子憐之闕澤曰寒氏以名澤也盛姬求飲天子命人取漿而給得之速也傳曰何其給也是曰壺輲壺器名輲音遄速也與遄同天子西至于重璧之臺盛姬告病闕天子哀之上疑說盛姬死也是曰哀次哭泣之位次天子乃殯盛姬于轂丘之廟先王之廟有在此者闕漢氏亦所在有廟焉壬寅天子命哭令群臣大臨也啟為主為之喪主即下伊扈也上啓疑為開殯出棺也祭父賔喪儐贊禮儀天子王女叔㛗為主叔㛗穆王之女也音癕痤天子闕賔之命終喪禮令持喪終禮也於是殤祀而哭殤未成喪盛姬年小也内史執筞所以書贈賵之事内史主冊命者官人闕丌職曾祝敷筵席設几敷猶鋪也周禮曰喪事仍几盛饋具饋具奠也肺鹽羮肉也當以音行胾大臠脯棗􅋳粥清也音移􅊽肉醤也魚腊乾魚糗寒粥也韭韭􅀢百物言備有也乃陳腥俎十二乾豆九十鼎敦壺尊四十敦似盤音堆器雜器皿也曾祝祭食禮雖喪祭皆祭食示有所先也進肺鹽祭酒以肺換鹽中以祭所謂振祭也禮以肺見少牢饋食也乃獻喪主伊扈伊扈拜受闕祭女又獻女主叔㛗叔㛗拜受祭闕祝報祭觴大師樂官乃哭即位就喪位也畢哭内史闕筞而哭筞上宜作讀既夕禮曰主人之史讀賵是也曾祝捧饋而哭捧兩手持也御者闕祈而哭侍御者禮曰御者入浴抗者觴夕而哭抗猶舉也禮記曰小臣四人抗衾也佐者承斗而哭佐斂者也斗斟水杓也佐者佐飲食者衣衾佩闕而哭樂闕人陳琴瑟闕竽疑竽上宜作笙笙亦竽屬籥如笛三孔􅧛今㦸吏所吹者筦筦如併兩笛音管而哭百闕衆官人各闕其職事以哭百衆猶百族也曰士女錯踊九闕乃終錯互也哭則三踊三哭而九踊所謂成踊者也䘮主伊扈哭出造舍倚廬也父兄宗姓及在位者從之佐者哭佐斂者也且徹饋及壺鼎俎豆皆佐者主為之衆宫人各闕其職皆哭而出事畢井利闕事後出而收井利所以獨後出者典喪祭器物收斂之也或曰井利稽慢出不及軰故牧縛之癸卯大哭殤祀而載載祖載也甲辰天子南葬盛姬於樂池之南即𤣥池也天子乃命盛姬闕之䘮視皇后之葬法視猶比也亦不拜後于諸侯疑字錯誤所未詳也河濟之間共事供給事也韋榖黄城三邦之事輦䘮輦謂挽輴車發三國之衆以示榮侈七萃之士抗者即車舉棺以就車曾祝先䘮導也大匠御棺為棺御也周禮曰䘮祝為御禮記曰諸侯御柩以羽葆謂在前為行止之節日月之旗七星之文言旗上畫日月及北斗星也禮記曰日月為旗常亦通名鼓鍾以葬龍旗以闕鳥以建鼓獸以建鍾龍以建旗曰喪之先後及哭踊者之間畢有鍾旗闕百物䘮器井利典之列于䘮行靡有不備行行伍擊鼓以行䘮舉旗以勸之令盡哀也擊鍾以止哭彌旗以節之為節音節彌猶低也曰闕祀大哭九而終䘮出于門喪主即位就哭位也周室父兄子孫倍之倍倍列位也諸侯屬子宗屬群子王吏倍之外官王屬七萃之士倍之外官所主在外者姬姓子弟倍之盛姬之族屬也執職之人倍之執職猶職事也百官衆人倍之哭者七倍之列七重踊者三十行行萃百人百人為一倍萃聚也女主即位嬖人羣女倍之嬖人王所幸愛者王臣姬姓之女倍之疑同姓之女為大夫士妻者所謂内宗也宫官人倍之宫官為内也宫賢庶妾倍之庶妾衆散妾也哭者五倍踊者次從以次相從曰天子命喪一里而擊鍾止哭曰匠人哭于車上御棺不得下也曾祝哭于䘮七萃之士哭于喪所曰小哭錯踊三踊而行五里而次次猶止也曰喪三舍至于哀次五舍至于重璧之臺三十里為舍也傳曰避君三舍乃休休駐也天子乃周姑繇之水以圜喪車決水周繞之也繇音遥圜音員是曰冏車以號水也曰殤祀之於此復祭孟冬辛亥邢侯曹侯來弔曹國今濟陰定陶縣是也内史將之以見天子天子告不豫而辭焉不豫辭病也尚書曰武王不豫邢侯曹侯乃弔太子太子哭出廟門以迎邢侯曹侯不進再拜勞之問勞之也侯不答拜謙不敢與太子抗禮邢侯謁哭于廟謁告也太子先哭而入西向即位内史賔侯儐相北向而立大哭九邢侯厝踊三而止與太子拾踊太子送邢侯至廟門之外邢侯遂出太子再拜送之曹侯廟弔入哭太子送之亦如邢侯之禮雖弔異而禮同壬子天子具官見邢侯曹侯具官備禮相見天子還返將歸邢侯曹侯執見拜天子之武一義所未聞天子見之乃遣邢侯曹侯歸于其邦王官執禮共于二侯如故言不以䘮廢禮曰天子出憲憲命以或襚賵此以上似説賵贈事衣物曰襚音遂癸丑大哭而闕甲寅殤祀大哭而行喪五舍于大次曰喪三日于大次停三日也殤祀如初辛酉大成百物皆備送葬之物具備壬戌葬史錄繇鼓鍾以赤下棺窆也七萃之士闕士女錯踊九闕䘮下下謂入土昧爽天子使嬖人所愛幸者贈用文錦明衣九領謂之明衣言神明之衣䘮宗伊扈贈用變裳宗亦主變裳裳名也女主叔㛗贈用茵組茵褥百嬖人官師畢贈言盡有襚賵也官師群士號也禮記曰官師一廟井利乃藏藏之於墓所報哭于大次報猶反也大次有次神次也祥祠闕祝䘮罷哭辭于逺人辭謝遣歸為盛姬諡曰哀淑人恭仁短折曰哀天子丘人為丘作名是曰淑人之丘乙丑天子東征舍于五鹿叔㛗思哭思哭盛姬是曰女㛗之丘因以名五鹿也丁卯天子東征釣于漯水以祭淑人是曰祭丘己巳天子東征食馬于漯水之上乃鼓之􅁄是曰馬主未詳所云癸酉天子南征至于菹臺仲冬甲戍天子西征至於因氏國名天子乃釣于河以觀姑繇之木姑繇大木也山海經云㝷木長千里生海邊謂此木𩔖丁丑天子北征戊寅舍于河上乃致父兄子弟王臣姬闕祥祀畢哭上云王臣姬姓之女疑此亦同也終䘮于囂氏服闋己卯天子西濟于河囂氏之遂庚辰舍于茅尺地名於是禋祀除䘮始樂素服而歸哀未忘也是曰素氏天子遂西南癸未至於野王今河内縣甲申天子北升于大北之隥疑此太行山也而降休于兩栢之下有兩栢也天子永念傷心乃思淑人盛姬於是流涕七萃之士葽豫上諫于天子曰自古有死有生豈獨淑人天子不樂出於永思永思有益莫忘其新言思之有益者莫忘更求新人天子哀之乃又流涕聞此言愈更増感也是日輟己未乙酉天子西絶鈃隥即鈃山之坂一云癸巳逰于井鈃之山吉日癸巳乃遂西南戊子至于盬盬盬池今在河東解縣盬音古己丑天子南登于薄山窴軨之隥今軨橋西南懸絶中央有兩道乃宿于虞虞國名今太陽縣庚申天子南征吉日辛卯天子入於南鄭穆天子傳卷六
