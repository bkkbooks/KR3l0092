  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0092_WYG_002-1a, image: WYG1042/WYG1042-0251c.png}
body:
  text: 穆天子傳卷二晉郭璞註古文闕伯天曰闕封膜晝于河水之陽膜晝人名疑音莫以為殷人主主謂主其祭祀言同姓也丁巳天子西南升闕之所主居以説古之賢聖以居爰有大木碩草碩大也爰有野獸可以畋獵戊午昌闕之人居慮古疇字居慮名獻酒百闕于天子百下脱盛酒器名天子已飲而行遂宿于昆侖之阿赤水之陽昆侖山有五色水赤水出東南隅而東北流皆見山海經爰有􅜑鳥之山􅜑音甄一名栴天子三日舍于􅜑鳥之山闕吉日辛酉天子升于昆侖之丘以觀黄帝之宫黄帝廵遊四海登昆侖山起宫室於其上見新語而豐闕隆之塟隆上字疑作豐豐隆筮御雲得大壮卦遂為雷師亦猶黄帝橋山有墓封謂增高其上土也以標顯之耳以詔後世詔謂語之癸亥天子具蠲齊牲全以禋闕昆侖之丘蠲者潔也齊祭神曰禋書天子禋于六宗蠲音圭甲子天子北征舍于珠澤此澤出珠因名之曰今越嶲平澤出青珠是以釣于流水曰珠澤之藪方三十里澤中有草者為藪爰有雚葦莞蒲莞䓗蒲或曰莞蒲齊名耳關西云莞音丸芧萯萯今菩字音倍蒹蒹荷也似雚而細音兼葽莠屬詩曰四月秀葽乃獻白玉闕􅃗闕角之一闕三可以闕沐乃進食闕酒十闕姑劓九闕亦味中糜胃而滑中猶合也因獻食馬三百可以供厨膳者牛羊三千天子闕昆侖此以上似說封人於昆侖山旁以守黄帝之宫南司赤水而北守舂山之寶欲以崇表聖德因用顯其功迹天子乃闕之人闕吾黄金之環三五空邊等為環朱帶貝飾三十淮南子曰其貝帶駿飜是也工布之四闕吾乃膜拜而受今之胡人禮佛舉手加頭稱南膜拜者即此𩔖也音模天子又與之黄牛二六以為犧牲種以三十闕人于昆侖丘季夏丁卯天子北升于舂山之上以望四野曰舂山是唯天下之高山也孶木闕華畏雪天子於是取孶木華之實持歸種之孶音滋曰舂山之澤清水出泉温和無風炁條適也飛鳥百獸之所飲食先王所謂縣圃淮南子曰昆侖去地一萬一千里上有曽城九重或上倍之是謂閬風或上倍之是謂𤣥圃以次相及山海經云閬風昆侖𤣥圃各一山但相近耳又曰實唯帝之平圃也天子於是得玉筞枝斯之英英玉之精華也尸子曰龍泉有玉英山海經曰黄帝乃取宻山之玉筞而投之鍾山之陽是也曰舂山百獸之所聚也飛鳥之所棲也爰有闕獸食虎豹如麋而載骨盤闕始如麕小頭大鼻麕麞是也爰有赤豹白虎詩云赤豹黄羆熊羆豺狼野馬野牛山羊野豕今華陰山有野牛山羊肉皆千斤爰有白鳥青鵰執犬羊食豕鹿今之鵰亦能食獐鹿曰天子五日觀于舂山之上乃為銘迹於縣圃之上以詔後世謂勒石銘功德也秦始皇漢武帝廵守登名山所在刻石立表此之𩔖也壬申天子西征甲戍至于赤烏之人其獻酒千斛于天子食馬九百羊牛三千穄麥百載穄似黍而不粘天子使祭父受之曰赤烏氏先出自周宗與周同始祖大王亶父即古公亶父字也之始作西土言作興於岐山之下今邑在扶風美陽是也封其兄子吳太伯于東吳太伯讓國入吳因即封之于吳詔以金刃之刑南金精利故語其刑法也賄用周室之璧賄贈賄也封丌璧臣長季綽于舂山之虱妻以元女詔以玉石之刑昆侖山出美玉石處故以語之以為周室主天子乃賜赤烏之人闕其墨乗四周禮大夫乗墨車黄金四十鎰二十兩為鎰貝帶五十朱三百裹丌乃膜拜而受裹音罪過之過丌名赤烏人名也曰闕山是唯天下之良山也寳玉之所在嘉榖生之草木碩美天子於是取嘉禾以歸樹于中國漢武帝取外國香草美菜種之中國曰天子五日休于闕山之下乃奏廣樂赤烏之人丌好獻女于天子所以結恩好也女聽女列為嬖人一名聽名失一女名下文曰赤烏氏美人之地也寶玉之所在也己卯天子北征趙行闕舍趙猶超騰舍三十里庚辰濟于洋水洋水出崑崙山西北隅而東流洋音詳辛巳入于曹奴之人戲觴天子于洋水之上戲國人名也乃獻食馬九百牛羊七千穄米百車天子使逢固受之逢固周大夫天子乃賜曹奴之人戲闕黄金之鹿銀闕今所在地中得玉肫金狗之𩔖此皆古者以賂夷狄之竒貨也貝帶四十朱四百裹戲乃膜拜而受壬午天子北征東還從東頭而還歸甲申至於黑水水亦出崑崙山西北隅而東南流西膜之所謂鴻鷺西膜沙漠之鄉以言外域人名物與中華不同春秋叔弓敗莒師于濆水穀梁傳曰狄人謂濆泉失名號以中國名從主人之𩔖也於是降雨七日天子留骨六師之屬穆王馬駿而御良故行輙出從衆前天子乃封長肱于黑水之西河即長臂人也身如中國臂長三丈魏時在赤海中得此人􅅂也長脚人國又在赤海東皆見山海經是惟鴻鷺之上以為周室主是曰留骨之邦因以名之辛卯天子北征東還乃循黑水癸巳至于羣玉之山即山海云群玉山西王母所居者容闕氏之所守曰羣玉田山闕知阿平無險言邊無險阻也四徹中繩言皆平直先王之所謂筞府言往古帝王以為藏書冊之府所謂藏之名山者也寡草木而無鳥獸言純玉石也爰有闕木西膜之所謂闕天子於是取玉三乗玉器服物環佩之屬於是載玉萬隻隻玉為瑴見左氏傳天子四日休羣玉之山休遊息也乃命邢侯待攻玉者待留之也邢今廣平襄邑縣孟秋丁酉天子北征闕之人潛時潛時名也觴天子于羽陵之上乃獻良馬牛羊天子以其邦之攻玉石也不受其牢重慎費其牢牲禮也伯天曰闕氏檻闕之後也天子乃賜之黄金之罌三六即盂也徐州謂之罌朱三百裹潛時乃膜拜而受戊戍天子西征辛丑至于剞閭氏音倚天子乃命剞閭氏供食六師之人天子六軍詩曰周王于邁六師及之于䥫山之下壬寅天子登于䥫山乃徹祭器于剞閭之人以祭餘胙賜之温歸乃膜拜而受温歸名也天子已祭而行乃遂西征丙午至于􅜑韓氏爰有樂野温和穄麥之所草此字作草下早疑古茂字犬馬牛羊之所昌昌猶盛也寶玉之所闕丁未天子大朝于平衍之中衍墳之下者見周禮乃命六師之屬休己酉天子大饗正公諸侯王吏七萃之士于平衍之中􅜑韓之人無鳬乃獻良馬百匹用牛三百可服用者良犬七千調習者牥牛二百野馬三百牛羊二千穄麥三百車天子乃賜之黄金銀罌四七貝帶五十朱三百裹變闕雕官無鳬上下乃膜拜而受疑古上下字今夷狄官多復名庚戍天子西征至于𤣥池天子三日休于𤣥池之上乃奏廣樂三日而終是曰樂池因改名為廣樂池猶漢武改祠鄉為聞喜之𩔖天子乃樹之竹種竹池邊是曰竹林竹林盛者為林癸丑天子乃遂西征丙辰至于苦山西膜之所謂茂苑天子於是休獵於是食苦苦屮名可食丁巳天子西征己未宿于黄䑕之山西闕乃遂西征癸亥至于西王母之邦穆天子傳卷二
