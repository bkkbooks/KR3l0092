  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0092_WYG_001-1a, image: WYG1042/WYG1042-0249a.png}
body:
  text: 穆天子傳卷一晉郭璞註古文飲天子蠲音涓山之上戊寅天子北征乃絶漳水絶猶截也漳水今在鄴縣庚辰至于闕觴天子于盤石之上觴者所以進酒因云觴耳天子乃奏廣樂史記云趙簡子疾不知人七日而寤曰我之帝所甚樂與百神逰于鈞天廣樂九奏萬舞不𩔖三代之樂其聲動心廣樂義見此載立不舍言在車上立不下也至于鈃山之下即鈃山今在常山石邑縣鈃音邢癸未雨雪天子獵于鈃山之西阿阿山陂也於是得絶鈃山之隊隊謂谷中險阻道也音遂北循虖沱之陽虖沱河今在鴈門鹵城縣陽水北沲音槖駝之駝乙酉天子北升于闕天子北征于犬戎國語曰穆王將征犬戎祭公謀父諌不從遂征之得四白狼四白鹿以歸自是荒服不至紀年又曰取其五王以東犬戎闕胡觴天子于當水之陽天子乃樂闕賜七萃之士戰萃集也聚也亦猶傳有輿大夫皆聚集有智力者為王之爪牙也庚寅北風雨雪詩曰北風其凉雨雪其霶天子以寒之故命王屬休令王之徒屬休息也甲午天子西征乃絶隃之關隥隥阪也疑北謂北陵西隃西己亥隃鴈門山也音俞己亥至于焉居禺知之平疑皆國名辛丑天子西征至于䣙人䣙國名音叵肯切河宗之子孫䣙栢絮伯爵絮名古伯字多从木且逆天子于智之闕先豹皮十良馬二六古者為禮皆有以先之傳曰先進乗韋天子使井利受之井利穆王之嬖臣癸酉天子舍于漆一宿為舍乃西釣于河以觀闕智之闕甲辰天子獵于滲澤於是得白狐𤣥狢焉以祭于河宗以將有事于河竒此獲故用之漢武帝郊祀得一角白鹿以為祥瑞亦將燎祭之𩔖丙午天子飲于河水之阿阿水峯也天子屬六師之人于䣙邦之南滲澤之上屬猶㑹也戊寅天子西征鶩行至于陽紆之山鶩猶馳也紆音嘔河伯無夷之所都居無夷馮夷也山海經云冰夷是惟河宗氏河四瀆之宗主河者目以為氏河宗伯天逆天子燕然之山伯天字也勞用束帛加璧勞郊勞也五兩為一束兩今之二丈先白闕天子使􅀈父受之􅀈父􅀈公謀父作祈招之詩者癸丑天子大朝于燕闕之山河水之阿葢朝㑹羣官告將禮河也乃命井利梁固梁門大夫聿將六師聿猶曰也天子命吉日戊午詩曰吉日庚午天子大服冕禕冕冠禕衣葢王后之上服今帝服之所未詳禕音暉帗帶帗韗也天子赤帗音弗搢曶曶長三尺杼上椎頭一名珽亦謂之大圭搢猶帶也曶音忽夾佩左右兩佩奉璧南面立于寒下寒下未詳曾祝佐之曾重也傳曰曽臣偃官人陳牲全五闕具牛羊之品曰牲體完曰全牲或曰全色純也傳曰牲全肥腯天子授河宗璧河宗伯天受璧西向沉璧于河河位載崑崙再拜稽首稽首首至地也祝沉牛馬豕羊河宗闕命于皇天子加皇者尊上之河伯號之呼穆王帝曰穆滿以名應謙也言諡葢後記事者之辭女當永致用旹事語穆王當長幹理世事也哉南向再拜穆王拜河宗又號之帝曰穆滿示女舂山之珤山海經舂字作鍾音同耳言此山多珍寶竒怪詔女崑崙闕舍四平泉七十疑皆説崑崙山上事物乃至於崑崙之丘以觀舂山之珤皆河伯與穆王詞語賜語晦月終為晦言葢賜女受終福天子受命南向再拜受河伯命己未天子大朝于黄之山將禮河而去乃披圖視典用觀天子之珤器省河所視禮圖曰天子之珤曰河圖辭也玉果石似美玉所謂大果者也璿珠璿玉𩔖也音旋燭銀銀有精光如燭黄金之膏金膏亦猶玉膏皆其精汋也天子之珤萬金闕珤百金士之珤五十金庶人之珤十金自萬金以下宜次言諸侯之珤千金大夫之珤百金此書殘缺集錄者不續以見闕文耳天子之弓射人歩劍牛馬犀闕器千金歩劍疑歩光之劍也犀似水牛􅋻脚脚為三角黑色天子之馬走千里勝人猛獸言炁勢傑駭也天子之狗走百里執虎豹言觔力壮猛也伯天曰征鳥使翼曰闕烏鳶音緣鵶也鸛雞飛八百里即鵾雞鵠屬也名獸使足闕走千里狻猊闕野馬走五百里狻猊獅子亦食虎豹野馬亦如馬而小狻音酸猊音倪卭卭距虚走百里亦馬屬尸子曰距虚不擇地而走山海經云蛩蛩距虚並言之耳麋闕二十里自麋以上似次第獸能走里數逺近曰伯天皆致河典典禮也自此以上事物皆河圖數載河伯以為禮禮穆王也乃乗渠黄之乗為天子先先驅導路也以極西土極竟乙丑天子西濟于河闕爰有温谷樂都温谷言冬暖也燕有寒谷不生五榖河宗氏之所遊居伯天之别州邑丙寅天子屬官效器㑹官司閲所得珤物乃命正公郊父正公謂三上公天子所取正者郊父為之受勑憲憲教令也管子曰皆受憲用伸闕八駿之乘八駿名在下以飲于枝洔之中水岐成洔洔小渚也音止積石之南河積石山名今在金城河間縣南河出北山而東南流天子之駿駿者馬之美稱赤驥世所謂騏驥盜驪為馬細頸驪黑色也白義踰輪山子渠黄華騮色如華而赤今名馬縹赤者為棗騮棗騮赤也綠耳綠耳曰北唐之君來見以一騮馬是生綠耳魏時鮮卑獻千里馬白色而兩耳黄名曰黄耳即此𩔖也八駿皆因其毛色以為名號耳案史記造父為穆王得盜驪華騮綠耳之馬御以西廵逰見西王母樂而忘歸皆與此同若合符契狗重工徹止雚猳闕黄南闕來白皆淩狗之名亦猶宋鵲之𩔖天子之御造父三百下云三百為御者耿翛芍及造父善御穆王封之於趙城餘未聞也曰天子是與出闕入藪田獵釣弋弋繳射也天子曰於乎予一人不盈于德盈猶充也而辨於樂辨作遊樂之事後世亦追數吾過乎穆王遊放過度行輙忘歸故作此言以自警也七萃之士闕天子曰後世所望無失天常奉六時也農工既得歳豐登也男女衣食無饑寒也百姓珤富富者安也官人執事各視職事故天有旹四時民闕氏響闕音國何謀於樂言不規樂而樂自及何意之忘常慎德也與民共利世以為常也天子嘉之善其有辭賜以左佩華也玉華之佩佩之精也乃再拜頓首穆天子傳卷一
