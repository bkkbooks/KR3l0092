body:
  text: 穆天子傳卷之四古文庚辰至于滔水濁繇氏之所食辛巳天子東征癸未至于蘇谷骨飦氏之所衣被乃遂南征東還丙戌至于長𣴽重𢀄氏之西疆丁亥天子升于長𣴽乃遂東征庚寅至于重𢀄氏黑水之阿爰有野麥爰有苔堇西膜之所謂木禾重𢀄氏之所食爰有采石之山重𢀄氏之所守曰枝斯璿瑰𤤄瑤琅玕玪𤧜㒫𤫋玗琪尾凡好石之器于是出孟秋癸巳天子命重𢀄氏共食天子之屬五日丁酉天子升于采石之山於是取采石焉天子使重𢀄之民鑄以成器于黑水之上器服物佩好無疆曰天子一月休秋癸亥天子觴重𢀄之人鰥𩖿乃賜之黃金之罌二九銀鳥一隻貝帶五十珠七百裹筍箭桂薑百𡸍絲雕官鰥𩖿乃膜拜而受乙丑天子東征鰥𩖿送天子至于長沙之山隻天子使柏夭受之柏夭曰重𢀄氏之先三苗氏之處以黃木𢁎銀采乃膜拜而受丙寅天子東征南還己巳至于文山西膜之所謂觴天子于文山西膜之人乃獻食馬三百牛羊二千穄米千車天子使畢矩受之曰天子三日遊于文山於是取采石壬寅天子飲于文山之下文山之人歸遺乃獻良馬十駟用牛三百守狗九十牥牛二百天子之豪馬豪牛龍狗豪羊以三十祭文山又賜之黃金之罌二九貝帶三十朱三百裹桂薑百𡸍歸遺乃膜拜而受癸酉天子命駕八駿之乘又服𧃭騮而左綠耳右驂赤驥而左白義天子主車造父為御為右次車之乘右服渠黃而左踰輪右驂盜驪而左山子柏夭主車參百為御奔戎為右天子乃遂東南翔行馳驅千里至于巨蒐氏巨蒐之人𠮀奴乃獻白鵠之血以飲天子因具牛馬之湩以洗天子之足及二乘之人甲戌巨蒐之𠮀奴觴天子于焚留之山乃獻馬三百牛羊五千秋麥千車膜稷三十車天子使柏夭受之好獻枝斯之英四十𠍝𤕁𠢮𦉔珌佩百隻琅玕四十𩟜𡮖十篋天子使造父受之乃賜之銀木𤧜采黃金之罌二九貝帶四十朱三百裹桂薑百𡸍𠮀奴乃膜拜而受乙亥天子南征陽紆之東尾乃遂絕𠭺𦟆之谷已至于𣠴𤧱河之水北阿爰有溲之河伯之孫事皇天子之山有模菫其葉是食明后天子嘉之賜以佩玉一隻柏夭再拜稽首癸丑天子東征柏夭送天子至于䣙人䣙伯絮觴天子于澡澤之上𣂿多之汭河水之所南還曰天子五日休于澡澤之上以待六師之人戊午天子東征顧命柏夭歸于丌邦天子曰河宗正也柏夭再拜稽首天子南還升于長松之隥孟冬壬戌天子至于雷首犬戎胡觴天子于雷首之阿乃獻食馬四六天子使孔牙受之曰雷水之平寒寡人具犬馬牛羊爰有黑牛白角爰有黑羊白血癸亥天子南征升于髭之隥丙寅天子至于鈃山之隊東升于三道之隥乃宿于二邊命毛班逄固先至于周以待天之命癸酉天子命駕八駿之乘赤驥之駟造父為御南征翔行逕絕翟道升于太行南濟于河馳驅千里遂入于宗周官人進白鵠之血以飲天子以洗天子之足造父乃具羊之血以飲四馬之乘一庚辰天子大朝于宗周之廟乃里西土之數曰自宗周瀍水以西北至于河宗之邦陽紆之山三千有四百里自陽紆西至于西夏氏二千又五百里自西夏至于珠余氏及河首千又五百里自河首襄山以西南至于舂山珠澤昆侖之丘七百里自舂山以西至于赤烏氏舂山三百里東北還至于群玉之山截舂山以北自群玉之山以西至于西王母之邦三千里自西王母之邦北至于曠原之野飛鳥之所解其羽千有九百里宗周至于西北大曠原一萬四千里乃還東南復至于陽紆七千里還歸于周三千里各行兼數二萬有五千里吉日甲申天子祭于宗周之廟乙酉天子六師之人于洛水之上丁亥天子北濟于河羝之隊以西北升于盟門九河之隥乃遂西南仲冬壬辰至𤃻山癸巳天子飲于𤃻山之上乃奏廣樂三日而終吉日丁酉天子入于南鄭
