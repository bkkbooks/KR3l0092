body:
  text: 穆天子傳卷之三古文吉日甲子天子賓于西王母乃執白圭玄璧以見西王母好獻錦組百純組三百純西王母再拜受之乙丑天子觴西王母于瑤池之上西王母為天子謠曰白雲在天山䧙自出道里悠遠山川間之將子無死尚能復來天子答之曰予歸東土和治諸夏萬民平均吾顧見汝比及三年將復而野天子遂驅升于弇山乃紀丌跡于弇山之石而樹之槐眉曰西王母之山西王母之山還歸丌世民作憂以吟曰比徂西土爰居其野虎豹為群於鵲與處嘉命不遷我惟帝女天子大命而不可稱顧世民之恩流涕芔隕吹笙鼓簧中心翔翔世民之子唯天之望丁未天子飲于溫山考鳥己酉天子飲于溽水之上乃發憲令詔六師之人其羽爰有藪水澤爰有陵衍平陸碩鳥解羽六師之人畢至于曠原曰天子三月舍于曠原天子大饗正公諸侯王勤七萃之士于羽琌之上乃奏廣樂六師之人翔畋于曠原得獲無疆鳥獸絕群六師之人大畋九日乃駐于羽陵之收皮效物債車受載天子於是載羽百車己亥天子東歸六師起庚子至于之山而休以待六師之人庚辰天子東征癸未至于戊之山智氏之所處智往天子于戊之山勞用白驂二疋野馬野牛四十守犬七十乃獻食馬四百牛羊三千曰智氏天子北遊于𠭽子之澤智氏之夫獻酒百于天子天子賜之狗𤦄采黃金之罌二九貝帶四十珠丹三百裹桂薑百𡸍乃膜拜而受乙酉天子南征東還己丑至于獻水乃遂東征飲而行乃遂東南己亥至于瓜纑之山三周若城閼氏胡氏之所保天子乃遂東征南絕沙衍辛丑天子渴于沙衍求飲未至七萃之士曰高奔戎刺其左驂之頸取其清血以飲天子天子美之乃賜奔戎佩玉一隻奔戎再拜䭫首天子乃遂南征甲辰至于積山之邊爰有蔓柏曰𠷎余之人命懷獻酒于天子天子賜之黃金之罌貝帶朱丹七十裹命懷乃膜拜而受乙巳諸飦獻酒于天子天子賜之黃金之罌貝帶朱丹七十裹諸飦乃膜拜而受
