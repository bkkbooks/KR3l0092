body:
  text: 卷之一古文飲天子蠲音涓山之上戊寅天子北征乃絕漳水絕猶截也漳水今在鄴縣庚辰至于觴天子于盤石之上觴者所以進酒因云觴耳天子乃奏廣樂史記云趙簡子疾不知人七日而寤曰我之帝所甚樂而百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動心廣樂義見此載立不舍言在車上立不下也至于鈃山之下即鈃山今在常山石邑縣鈃音邢癸未雨雪天子獵于鈃山之西阿阿山陂也於是得絕鈃山之隊隊謂谷中險阻道也音遂北循虖沱之陽虖沱河今在鴈門鹵城縣陽水北沱音橐駝之駝乙酉天子北升于天子北征于犬戎國語曰穆王將征犬戎祭公謀父諫不從遂征之得四白狼四白鹿以歸自是荒服不至紀年又曰取其五王以東犬戎胡觴天子于當水之陽天子乃樂賜七萃之士戰萃集也聚也亦猶傳有輿大夫皆聚集有智力者為王之瓜牙也庚寅北風雨雪詩曰北風其涼雨雪其雱天子以寒之故命王屬休令王之徒屬休息也甲午天子西征乃絕隃之關隥隥阪也疑此謂北陵西隃西己亥隃鴈門山也音俞己亥至于焉居禺知之平疑皆國名辛丑天子西征至于䣙人䣙國名音叵肯切河宗之子孫䣙柏絮伯爵絮名古伯字多以木且逆天子于智之先豹皮十良馬二六古者為禮皆有以先之傳曰先進乘韋天子使井利受之井利穆王之嬖臣癸酉天子舍于漆𣼦一宿為舍乃西釣于河以觀智之甲辰天子獵于滲澤於是得白狐玄貈焉以祭於河宗以將有事于河奇此獲故用之漢武帝郊祀得一角白鹿以為祥瑞亦將燎祭之類丙午天子飲于河水之阿阿水峰也天子屬六師之人于䣙邦之南滲澤之上屬猶會也戊寅天子西征鶩行至于陽紆之山鶩猶馳也紆音嘔河伯無夷之所都居無夷馮夷也山海經云冰夷是惟河宗氏河四瀆之宗主河者目以為氏河宗伯夭逆天子燕然之山伯夭字也勞用束帛加璧勞郊勞也五兩為一束兩今之二丈先白天子使𨝋父受之𨝋父𨝋公謀父作祈招之詩者癸丑天子大朝于燕之山河水之阿蓋朝會郡官告將禮河也乃命井利梁固梁門大夫聿將六師聿猶曰也天子命吉日戊午詩曰吉日庚午天子大服冕褘冕冠褘衣蓋王后之上服今帝服之所未詳褘音暉帗帶帗韗也天子赤帗音弗搢曶曶長三尺杼上椎頭一名珽亦謂之大圭搢猶帶也曶音忽夾佩左右兩佩奉璧南面立于寒下寒下未詳曾祝佐之曾重也傳曰曾臣偃官人陳牲全五具牛羊之品曰生體完曰全牲或曰全色純也傳曰牲全肥腯天子授河宗璧河宗伯夭受璧西向沉璧于河河位載崑崙再拜稽首稽首首至地也祝沉牛馬豕羊河宗命于皇天子加皇者尊上之河伯號之呼穆王帝曰穆滿以名應謙也言謚蓋後記事者之辭女當永致用時事語穆王當長幹理世事也哉南向再拜穆王拜河宗又號之帝曰穆滿示女舂山之寶山海經舂字作鍾音同耳言此山多珍寶奇怪詔女昆侖舍四平泉七十疑皆說崑崙山上事物乃至於崑崙之丘以觀舂山之寶皆河伯與穆王詞語賜語晦月終為晦言賜賜女受終福天子受命南向再拜受河伯命己未天子大朝于黃之山將禮河而去乃披圖視典用觀天子之寶器省河所視禮圖曰天子之寶曰河圖辭也玉果石似美玉所謂女果者也璿珠璿玉類也音旋燭銀銀有精光如燭黃金之膏金膏亦猶玉膏皆其精汋也天子之寶萬金寶百金士之寶五十金鹿人之寶十金自萬金以下宜次言諸侯之寶千金大夫之寶百金此書殘缺集錄者不續以見闕文耳天子之弓射人步劍牛馬犀器千金步劍疑步光之劍也犀似水牛庫腳腳為三角黑色天子之馬走千里勝人猛獸言氣勢傑駭也天子之狗走百里執虎豹言筋力壯猛也柏夭曰征鳥使翼曰烏鳶音緣雅也鶤鷄飛八百里即鵾雞鵠屬也名獸使足走千里狻猊野馬走五百里狻猊獅子亦食虎豹野馬亦如馬而小俊音狻猊音倪邛邛距虛走百里亦馬屬尸子曰距虛不擇地而走山海經云恐恐距虛竝言之耳麋二十里自糜以上似次第獸能走里數近遠曰柏夭既致河典典禮也自此以上事物皆河圖數載河伯以為禮禮穆王也乃乘渠黃之乘為天子先先驅導路也以極西土極竟乙丑天子西濟于河爰有溫谷樂都溫谷言冬暖也燕有寒谷不生五穀河宗氏之所遊居伯夭之別州邑丙寅天子屬官效器會官司閱所得寶物乃命正公郊父正公謂三上公天子所取正者郊父為之受敕憲憲教令也管子曰皆受憲用申八駿之乘八駿名在下以飲于枝洔之中水岐成洔洔小渚也音止積石之南河積石山名今在金城河間縣南河出北山而東南流天子之駿駿者馬之美稱赤驥世所謂騏驥盜驪為馬細頸驪黑色也白義踰輪山子渠黃華騮色如華而赤今名馬標赤者為棗騮棗騮赤也綠耳緣耳曰北唐之君來見以一騮馬是生緣耳魏時鮮卑獻千里馬白色而兩耳黃名曰黃耳即此類也八駿皆因其毛色以為名號耳案史記造父為穆王得盜驪華騮緣耳之馬御以西巡遊見西王母樂而忘歸皆與此同若合符契狗重工徹止雚猳黃南來白皆淩狗之名亦猶宋鵲之類天子之御造父三百下云三百為御者耿翛芍及造父善御穆王封之於趙城餘未聞也曰天子是與出入藪田獵釣弋弋繳射也天子曰於乎予一人不盈于德盈猶充也而辨於樂辨作遊樂之事後世亦追數吾過乎穆王遊放過度行輒忘歸故作此言以自警也七萃之士天子曰後世所望無失天常奉六時也農工既得歲豐登也男女衣食無飢寒也百姓寶富富者安也官人執事各視職事故天有時四時民氏響音國何謀於樂言不規樂而而樂自及何意之忘常慎德也與民共利世以為常也天子嘉之善其有辭賜以左佩玉華玉華之佩佩之精也乃再拜頓首
