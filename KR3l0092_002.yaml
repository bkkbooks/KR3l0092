body:
  text: 穆天子傳卷之二古文柏夭曰封膜晝于河水之陽以為殷人主丁巳天子西南升之所主居爰有大木碩草爰有野獸可以畋獵戊午𠷎之人居慮獻酒百于天子天子已飲而行遂宿于昆侖之阿赤水之陽爰有𪃋鳥之山天子三日舍于𪃋鳥之山吉日辛酉天子升于昆侖之丘以觀黃帝之宮而封豐隆之葬以詔後世癸亥天子具蠲齊牲全以禋昆侖之丘甲子天子北征舍于珠澤以釣于流水曰珠澤之藪方三十里爰有𦼉葦莞蒲茅萯蒹葽珠澤之人乃獻白玉隻角之一三可以沐乃進食酒十姑劓九丌味中麋胃而滑因獻食馬三百牛羊三千天子昆侖以守黃帝之宮南司赤水而北守舂山之寶天子乃賜之人吾黃金之環三五朱帶貝飾三十工布之四吾乃膜拜而受天子又與之黃牛二六以三十人於昆侖丘季夏丁卯天子北升于舂山之上以望四野曰舂山是唯天下之高山也孳木華不畏雪天子於是取孳木華之實持歸種之曰舂山之澤清水出泉溫和無風飛鳥百獸之所飲食先王所謂縣圃天子於是得玉榮枝斯之英曰舂山百獸之所聚也飛鳥之所棲也爰有獸食虎豹如麋而載骨盤始如麇小頭大鼻爰有赤豹白虎熊羆豺狼野馬野牛山羊野豕爰有白隼青鵰執犬羊食豕鹿曰天子五日觀于舂山之上乃為銘迹於縣圃之上以詔後世壬申天子西征甲戌至于赤烏赤烏之人其獻酒千斛于天子食馬九百羊牛三千穄麥百載天子使祭父受之曰赤烏氏先出自周宗大王亶父之始作西土封其元子吳太伯于東吳詔以金刃之刑賄用周室之璧封丌嬖臣長季綽于舂山之虱妻以元女詔以玉石之刑以為周室主天子乃賜赤烏之人其墨乘四黃金四十鎰貝帶五十具珠三百裹丌乃膜拜而受曰山是唯天下之良山也寶玉之所在嘉穀生之草木碩美天子於是取嘉禾以歸樹于中國曰天子五日休于山之下乃奏廣樂赤烏之人丌獻好女于天子女聽女列以為嬖人曰赤烏氏美人之地也寶玉之所在也己卯天子北征趙行舍庚辰濟于洋水辛巳入于曹奴曹奴之人戲觴天子于洋水之上乃獻食馬九百牛羊七千穄米百車天子使逄固受之天子乃賜曹奴之人戲黃金之鹿白銀之麇貝帶四十珠四百裹戲乃膜拜而受壬午天子北征東還甲申至于黑水西膜之所謂鴻鷺於是降雨七日天子留胥六師之屬天子乃封長肱于黑水之西河是惟鴻鷺之上以為周室主是曰留胥之邦辛卯天子北征東還乃循黑水癸巳至于群玉之山容成氏之所守曰群玉田山知阿平無險四徹中繩先王之所謂冊府寡草木而無鳥獸爰有木西膜之所謂天子于是攻其玉石取玉版三乘玉器服物載玉萬隻天子四日休于群玉之山乃命邢侯待攻玉者孟秋丁酉天子北征之人潛時觴天子于羽陵之上乃獻良馬牛羊天子以其邦之攻玉石也不受其牢伯夭曰氏檻之後也天子乃賜之黃金之罌三六朱三百裹潛時乃膜拜而受戊戌天子西征辛丑至于剞閭氏天子乃命剞閭氏供食六師之人于鐵山之下壬寅天子祭于鐵山祀於郊門乃徹祭器于剞閭之人溫歸乃膜拜而受天子已祭而行乃遂西征丙午至于鄄韓氏爰有樂野溫和穄麥之所草犬馬牛羊之所昌寶玉之所丁未天子大朝于平衍之中乃命六師之屬休己酉天子大饗正公諸侯王勤七萃之士于平衍之中鄄韓之人無鳧乃獻良馬百匹服牛三百良犬七千牥牛二百野馬三百牛羊二千穄麥三百車天子乃賜之黃金銀罌四七貝帶五十珠三百裹變雕官無鳧上下乃膜拜而受庚戌天子西征至于玄池天子休于玄池之上乃奏廣樂三日而終是曰樂池天子乃樹之竹是曰竹林癸丑天子乃遂西征丙辰至于苦山西膜之所謂茂苑天子於是休獵於是食苦丁巳天子西征己未宿于黃鼠之山西乃遂西征癸亥至于西王母之邦
